# EXAMPLE ONLY.
# LOCAL TEST ONLY.
# NOT PRODUCTION.
# MUST NOT BIND 8000.
# MUST NOT BE USED BY PRODUCTION NGINX.
#
# This file is for a future local/test proxy routing validation only. It is not
# mounted by the active docker-compose.yml and must not be copied into or loaded
# by production nginx/proxy configuration.
#
# Future host publishing must be 19080:80 only. Do not publish this test proxy
# on host port 8000.

upstream web_green_test_target {
    server web_green_test:8000;
}

server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Connection "";

    location = /healthz/ {
        proxy_pass http://web_green_test_target;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
    }

    location / {
        proxy_pass http://web_green_test_target;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}
