# EXAMPLE ONLY.
# LOCAL TEST ONLY.
# NOT ACTIVE.
# NOT USED BY NORMAL docker compose COMMANDS.
# MUST NOT BIND 8000.
# DEPRECATED FOR STANDALONE FULL PROXY VALIDATION.
#
# This file is separate from the active docker-compose.yml and is not loaded
# unless an operator explicitly passes it with `docker compose -f`.
# It is for a future local/test proxy routing validation only. It must not be
# used for production traffic, Cloudflare/domain routing, scheduler workflows,
# migrations, collectstatic, Shopify writes, Gmail calls, or email sends.
#
# Full local/test proxy validation must use the unified example:
# docker-compose.bluegreen.proxy-validation.example.yml
#
# This proxy-only file is kept as a low-level example. Do not run it standalone
# for full validation: if web_green_test was started by another Compose project,
# nginx will not resolve web_green_test:8000 across the separate Docker
# networks. If this file is used at all, web_green_test must already be on the
# exact same local_test_net network in the same Compose project.
#
# The validation must publish only 19080:80 from this proxy-only service.
name: aftersales-bluegreen-proxy-validation

services:
  bluegreen_proxy_test:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/bluegreen.local-test.example.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "19080:80"
    expose:
      - "80"
    networks:
      - local_test_net
    labels:
      com.kidstoylover.deploy.role: local-test-proxy
      com.kidstoylover.deploy.scope: local-test-only
      com.kidstoylover.deploy.production_traffic: "false"
    # No scheduler, database, migration, collectstatic, production proxy, or
    # production traffic service is declared in this test-only compose file.

networks:
  local_test_net:
    name: aftersales-bluegreen-proxy-validation_local_test_net
