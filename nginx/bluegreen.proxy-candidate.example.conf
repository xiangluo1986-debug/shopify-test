# MUST NOT BE USED BY PRODUCTION NGINX UNTIL APPROVED.
#
# This file is not mounted by the active docker-compose.yml and must not be
# copied into or loaded by production nginx/proxy configuration without a
# separate approved production apply task.
#
# Candidate local proxy port is expected to be host 18000 -> container 80 from
# docker-compose.bluegreen.proxy-candidate.example.yml. It must not bind host
# port 8000 and must not imply any Cloudflare/domain routing change.
#
# Future approved runtime must confirm actual upstream service names, ports,
# Docker network, health behavior, proxy reload/switch command, rollback
# command, and active-color state storage before this design can be used.

# Future upstream examples, design-only:
# upstream web_blue_candidate {
#     server web_blue:8000;
# }
#
# upstream web_green_candidate {
#     server web_green:8000;
# }

# Active-color placeholder.
# A future approved switch may generate this upstream from an active-color
# state file or controlled include. This example is static and does not switch
# traffic. The placeholder below assumes the future active color is green only
# so the config remains concrete and reviewable.
upstream bluegreen_active_candidate {
    # Actual upstream service name and port must be confirmed later.
    server web_green:8000;
}

server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Connection "";

    location = /healthz/ {
        proxy_pass http://bluegreen_active_candidate;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
    }

    location / {
        proxy_pass http://bluegreen_active_candidate;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}
