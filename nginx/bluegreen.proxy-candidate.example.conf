# EXAMPLE ONLY.
# PRODUCTION-CANDIDATE DESIGN ONLY.
# NOT ACTIVE.
# MUST NOT BE USED BY PRODUCTION NGINX UNTIL APPROVED.
#
# This file is not mounted by the active docker-compose.yml and must not be
# copied into or loaded by production nginx/proxy configuration without a
# separate approved production apply task.
#
# Candidate local proxy port is expected to be host 18000 -> container 80 from
# docker-compose.bluegreen.proxy-candidate.example.yml. It must not bind host
# port 8000 and must not imply any Cloudflare/domain routing change.
#
# The matching candidate Compose example defines web_blue, web_green, and
# bluegreen_proxy_candidate on one Docker network. This file is example-only;
# it is not production active config.
#
# Future approved runtime must confirm proxy reload/switch command, rollback
# command, and active-color state storage before this design can be used.

# Candidate upstream service names match the candidate Compose services.
upstream web_blue {
    server web_blue:8000;
}

upstream web_green {
    server web_green:8000;
}

# Active-color placeholder. A future approved switch will select either
# web_blue or web_green through a separately reviewed state/include mechanism.
# This static candidate test defaults to green so /healthz/ and normal traffic
# have a concrete upstream without switching production traffic.
upstream bluegreen_active_candidate {
    server web_green:8000;
}

server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Connection "";

    location = /healthz {
        proxy_pass http://bluegreen_active_candidate/healthz/;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
    }

    location = /healthz/ {
        proxy_pass http://bluegreen_active_candidate/healthz/;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
    }

    location / {
        proxy_pass http://bluegreen_active_candidate;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}
