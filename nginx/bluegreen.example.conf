# NOT ACTIVE / EXAMPLE ONLY.
# Draft nginx config for a future blue-green proxy review.
# This file is not mounted by the active docker-compose.yml and must not be used
# for production traffic until a separate apply task is approved.

upstream web_blue {
    server web_blue:8000;
}

upstream web_green {
    server web_green:8000;
}

# Active upstream selection concept:
# A future apply task should define a single source of truth for the active
# color, such as a generated include file, a reviewed config edit, or a proxy
# technology with first-class service discovery. This draft defaults to blue
# only to make the concept concrete; it is not an instruction to switch traffic.
map $http_x_bluegreen_preview $active_upstream {
    default web_blue;
    # Future switch example after green is healthy:
    # default web_green;
}

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Connection "";

    location = /healthz/ {
        proxy_pass http://$active_upstream;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
    }

    location / {
        proxy_pass http://$active_upstream;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}
