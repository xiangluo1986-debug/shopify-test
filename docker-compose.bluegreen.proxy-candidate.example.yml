# EXAMPLE ONLY.
# PRODUCTION-CANDIDATE DESIGN ONLY.
# NOT ACTIVE.
# NOT USED BY NORMAL docker compose COMMANDS.
# MUST NOT BIND 8000.
# MUST NOT CHANGE CLOUDFLARE.
# PRODUCTION APPLY NO-GO.
#
# This file is separate from the active docker-compose.yml and is not loaded
# unless an operator explicitly passes it with `docker compose -f`.
# It is documentation/example configuration for a future production-candidate
# blue-green proxy on local host port 18000 only.
#
# Do not use this file to deploy, start containers, reload a proxy, switch
# traffic, write active-color state, run migrations, run collectstatic, change
# Cloudflare routing, call Shopify APIs, call Gmail APIs, or send email.
#
# Proposed future shape, after separate approval:
# - web_blue and web_green reuse the existing aftersales-web image.
# - web_blue and web_green align with active web source/env wiring closely
#   enough for candidate /healthz/ validation while still avoiding migrations.
# - web_blue and web_green expose only container port 8000 on the candidate
#   network and do not publish host port 8000.
# - bluegreen_proxy_candidate publishes host 18000 -> container 80.
# - The active upstream must be selected by a separately reviewed future
#   active-color switch mechanism. This example does not implement that switch.
# - Host port 8000 remains untouched and must not be published here.
name: aftersales-bluegreen-proxy-candidate

x-candidate-django-web: &candidate-django-web
  image: aftersales-web
  env_file:
    - ./.env
  environment:
    TZ: Asia/Shanghai
    SHOPIFY_TRANSLATION_WORKFLOW_LOG_DIR: /app/workflow_logs
  volumes:
    - ./backend:/app
    - ./logs:/app/workflow_logs:ro
    - media:/app/media
  working_dir: /app
  expose:
    - "8000"
  networks:
    - bluegreen_candidate_net
  # Active web's image default also runs migrations. This candidate command is
  # intentionally limited to runserver for /healthz/ validation only.
  command: bash -lc "python manage.py runserver 0.0.0.0:8000"
  healthcheck:
    test:
      - CMD-SHELL
      - 'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/healthz/\", timeout=5).read()"'
    interval: 10s
    timeout: 5s
    retries: 6
    start_period: 20s

services:
  web_blue:
    <<: *candidate-django-web
    labels:
      com.kidstoylover.deploy.role: django-web
      com.kidstoylover.deploy.color: blue
      com.kidstoylover.deploy.scope: production-candidate-example
      com.kidstoylover.deploy.production_traffic: "false"
      com.kidstoylover.deploy.cloudflare_change: "false"
      com.kidstoylover.deploy.production_apply: "no-go"

  web_green:
    <<: *candidate-django-web
    labels:
      com.kidstoylover.deploy.role: django-web
      com.kidstoylover.deploy.color: green
      com.kidstoylover.deploy.scope: production-candidate-example
      com.kidstoylover.deploy.production_traffic: "false"
      com.kidstoylover.deploy.cloudflare_change: "false"
      com.kidstoylover.deploy.production_apply: "no-go"

  bluegreen_proxy_candidate:
    image: nginx:1.27-alpine
    depends_on:
      - web_blue
      - web_green
    volumes:
      - ./nginx/bluegreen.proxy-candidate.example.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "18000:80"
    expose:
      - "80"
    networks:
      - bluegreen_candidate_net
    labels:
      com.kidstoylover.deploy.role: production-candidate-proxy
      com.kidstoylover.deploy.scope: design-only
      com.kidstoylover.deploy.production_traffic: "false"
      com.kidstoylover.deploy.cloudflare_change: "false"
      com.kidstoylover.deploy.production_apply: "no-go"
    # No scheduler, migration, collectstatic, database destructive behavior,
    # Shopify/Gmail workflow, Cloudflare routing change, active-color state
    # write, production nginx config write, proxy reload, or traffic switch is
    # declared in this example.

volumes:
  media:

networks:
  bluegreen_candidate_net:
    name: aftersales-bluegreen-proxy-candidate_net
